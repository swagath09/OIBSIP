<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | AuthFlow</title>

    <link rel="stylesheet" href="auth.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div class="container">

        <div class="left">

            <h1>Welcome Back 👋</h1>

            <p>

                Login to continue your journey.

            </p>

            <form id="loginForm">

                <div class="input-box">

                    <label>Email</label>

                    <input
                        type="email"
                        id="loginEmail"
                        placeholder="Enter your email"
                        required>

                </div>

                <div class="input-box">

                    <label>Password</label>

                    <div class="password-box">

                        <input
                            type="password"
                            id="loginPassword"
                            placeholder="Enter your password"
                            required>

                        <i class="fa-solid fa-eye togglePassword"></i>

                    </div>

                </div>

                <div class="options">

                    <label>

                        <input type="checkbox">

                        Remember Me

                    </label>

                    <a href="#">

                        Forgot Password?

                    </a>

                </div>

                <button type="submit">

                    Login

                </button>

            </form>

            <div class="divider">

                <span>OR</span>

            </div>

            <div class="social-login">

                <button>

                    <i class="fab fa-google"></i>

                    Google

                </button>

                <button>

                    <i class="fab fa-facebook-f"></i>

                    Facebook

                </button>

                <button>

                    <i class="fab fa-github"></i>

                    GitHub

                </button>

            </div>

            <p class="register-link">

                Don't have an account?

                <a href="register.html">

                    Register Now

                </a>

            </p>

        </div>

        <div class="right">

            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQedaZRc-XAL7U2gXSiTBTwBlU427PWzb4csJ_6KHIkQQ&s=10" alt="Authentication">

        </div>

    </div>

    <script src="auth.js"></script>

</body>

</html>
